<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asbab Abaya — Moderator Panel</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f0d0a" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Asbab Abaya" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>

    <script>
      // Registers the service worker (sw.js) — needed for the "Add to
      // Home Screen" install prompt and for notifications to work.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((err) => {
            console.error("Service worker registration failed:", err);
          });
        });
      }
    </script>
  </body>
</html>
